###    Warmtepomp   ###

#
# Warmtepomp delta T, verschil tussen in- en outlet temperatuur
#
- sensor:
  - unique_id: wp_delta_t
    name: "WP delta T"
    device_class: temperature
    state_class: measurement
    unit_of_measurement: "°C"
    availability: >
      {{  states('sensor.adlar_warmtepomp_wp_outlet_temp') not in ['unavailable', 'unknown'] and
          states('sensor.adlar_warmtepomp_wp_inlet_temp') not in ['unavailable', 'unknown']
      }}
    state:
      "{{ states('sensor.adlar_warmtepomp_wp_outlet_temp') | float(0) | round(1)
      -states('sensor.adlar_warmtepomp_wp_inlet_temp') | float(0) | round(1)
      }}"

