#
# Set temperatuur Tado thermostaat
# diverse attributes met behulp van helpers
#
- sensor:
  - unique_id: smart_thermostat_x_set_temperatuur
    name: "Smart Thermostat X Set Temperatuur"
    device_class: temperature
    state_class: measurement
    unit_of_measurement: '°C'
    availability: >
      {{  state_attr('climate.smart_thermostat_x', "current_temperature") | is_number and
          state_attr('climate.smart_thermostat_x', "current_temperature") | float > 0 and
          state_attr('climate.smart_thermostat_x', "temperature") | is_number and
          state_attr('climate.smart_thermostat_x', "temperature") | float > 0 
      }}
    state: >-
      {{ state_attr('climate.smart_thermostat_x', "temperature") | float(18)
        }}


# graaddagen

# Graaddag
- trigger:
    platform: time
    at: "23:59:01"
  sensor:
  - name: degree_day_daily
    unique_id: degree_day_daily
    state: >
      {% set regularized_temp = 19.5 | float %}
      {% set average_outside_temp = states('sensor.gemiddelde_buitentemperatuur') | float %}
      {% set dd = regularized_temp - average_outside_temp %}
      {% if dd > 0 %}
        {{ dd }}
      {% else %}
        0
      {% endif %}      
    unit_of_measurement: 'DD'

