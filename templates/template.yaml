- sensor:
  - name: "Date and time"
    state: "{{ as_timestamp(states('sensor.date_time_iso')) | timestamp_custom('%A, %d %B %Y, %Rh') }}"
    icon: "mdi:calendar-clock"


#
# Waterkosten per m3: WMD
# Kale prijs plus inkoopvergoeding en belasting per m3
#
- sensor:
  - unique_id: price_water_incl
    name: "Prijs water inclusief"
    state_class: measurement
    unit_of_measurement: "€/m³"
#    device_class: monetary
    icon: mdi:currency-eur
    state: >-
      {% set btw = 9.0 | float() %}
      {% set inkoopprijs = 1.155400 | float() %} {# per m3, ex BTW #}
      {% set belasting_m3 = 0.149673 | float() %} {# per m3, ex BTW #}
      {% set price_m3 = (1 + btw/100) * (inkoopprijs + belasting_m3 ) %}
      {{ price_m3 }} 

