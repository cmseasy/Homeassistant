- sensor:
  - name: "Dauwpunt woonkamer"
    unique_id: dauwpunt_woonkamer
    device_class: temperature
    unit_of_measurement: "°C"
    availability: >
      {{  states('sensor.smart_thermostat_x_luchtvochtigheid') | is_number | float > 0 and
          states('sensor.smart_thermostat_x_temperatuur') | is_number | float > 0
      }}
    state: >
        {% set correctie_factor = 1.2 %}  
        {% set temp = states('sensor.buienradar_temperature') |float %}
        {% set RH = states('sensor.buienradar_humidity') |int %}
        {% set dewpoint = 243.04*(log(RH/100)+(17.625*temp/(243.04+temp)))
          /(17.625-log(RH/100)-(17.625*temp/(243.04+temp))) %}
        {{ dewpoint | float }}


- sensor:
  - name: "Dauwpunt buiten"
    unique_id: dauwpunt_buiten
    device_class: temperature
    unit_of_measurement: "°C"
    availability: >
      {{  states('sensor.buienradar_humidity') | is_number | float > 0 and
          states('sensor.buienradar_temperature') | is_number | float > 0
      }}
    state: >
        {% set correctie_factor = 1 %}  
        {% set temp = states('sensor.buienradar_temperature') |float %}
        {% set RH = states('sensor.buienradar_humidity') |int %}
        {% set dewpoint = 243.04*(log(RH/100)+(17.625*temp/(243.04+temp)))
          /(17.625-log(RH/100)-(17.625*temp/(243.04+temp))) %}
        {{ dewpoint | float }}



