esphome:
  name: "adlar-modbus"
  friendly_name: Adlar
  min_version: 2025.11.0
  name_add_mac_suffix: false

  on_boot:
    priority: 600
    then:
      - text_sensor.template.publish:
          id: online_template
          state: "gestart"
  on_shutdown:
    priority: 200
    then:
      - text_sensor.template.publish:
          id: online_template
          state: "gestopt"

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"

# Enable logging
logger:

# Enable Home Assistant API
api:
  port: 6053
  encryption:
    key: !secret adlar_modbus_encryption_key
  

# Allow Over-The-Air updates
ota:
- platform: esphome
  password: !secret adlar_modbus_ota_key

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  manual_ip:
    static_ip: 192.168.1.130
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  ap:
    ssid: !secret adlar_modbus_wifi_ap_ssid
    password: !secret adlar_modbus_wifi_ap_password

time:
  - platform: homeassistant
    id: homeassistant_time

captive_portal:

web_server:
  port: 80
  version: 3
  local: True
  include_internal: True
  # auth:
  #   username: !secret web_server_username
  #   password: !secret web_server_password
  sorting_groups:
    - id: sorting_group_configuration_setup
      name: "Configuration setup"
      sorting_weight: 10
    - id: sorting_group_number_settings
      name: "Number settings"
      sorting_weight: 20

# Adlar modbus
uart:
  - id: uart_modbus
    tx_pin: GPIO17
    rx_pin: GPIO16
    baud_rate: 9600
    data_bits: 8
    stop_bits: 1
    parity: NONE

modbus:
  - uart_id: uart_modbus
    id: modbus_client

modbus_controller:
  - id: modbus_adlar
    modbus_id: modbus_client
    address: 0x01
    update_interval: 60s
    command_throttle: 300ms
    setup_priority: -100

# Global varibelen
# globals:
#   - id: id_name
#     type: int
#     restore_value: true
#     initial_value: "0" 

button:
  - platform: restart
    name: "Restart ESP"
    icon: "mdi:restart"
    web_server:
      sorting_group_id: sorting_group_configuration_setup
      sorting_weight: 000

switch:
  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Main switch"
    id: main_switch   # Urenteller warmtepomp
    icon: "mdi:heat-pump"
    register_type: holding
    address: 0x0305
    web_server:
      sorting_group_id: sorting_group_configuration_setup
      sorting_weight: 100

