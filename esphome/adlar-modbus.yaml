binary_sensor:
  # Urenteller warmtepomp
  - platform: switch
    name: "In bedrijf"
    id: in_bedrijf
    source_id: main_switch
    device_class: power # Optional: shows as 'on'/'off' instead of 'open'/'closed'

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    address: 0x0000    
    register_type: holding
    bitmask: 0x01
    name: "Refrigerant Recovery"
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    address: 0x0000    
    register_type: holding
    bitmask: 0x2
    name: "Primary Anti-freeze"
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    address: 0x0000    
    register_type: holding
    bitmask: 0x4
    name: "Secondary Anti-freeze"
    disabled_by_default: true 

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    address: 0x0000    
    register_type: holding
    bitmask: 0x8
    name: "Fault Alarm"
    disabled_by_default: true 

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    address: 0x0000    
    register_type: holding
    bitmask: 0x010
    name: "System oil return"
    disabled_by_default: true
    on_press:
      - number.increment:
          id: oil_return_starts
          cycle: false

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    address: 0x0000    
    register_type: holding
    bitmask: 0x0100
    name: "Defrost running" # was name: "System Frosting"
    disabled_by_default: true
    on_press:
      - number.increment:
          id: defrost_starts
          cycle: false

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    address: 0x0000    
    register_type: holding
    bitmask: 0x01000
    name: "Compressor active" # was:  name: "Shutdown after Reaching Temp"
    id: compressor_active
    disabled_by_default: true
    on_press:
      - number.increment:
          id: compressor_starts
          cycle: false

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    address: 0x0000    
    register_type: holding
    bitmask: 0x2000
    name: "Shutdown after Unit Failure"
    disabled_by_default: true 

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    address: 0x0000    
    register_type: holding
    bitmask: 0x4000
    name: "Unit Operation"
    disabled_by_default: true 

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    address: 0x0000
    register_type: holding
    bitmask: 0x8000
    name: "Unit Waiting for Operation"
    disabled_by_default: true

sensor:
  - platform: uptime
    name: Adlar Uptime
    disabled_by_default: true

  - platform: wifi_signal
    name: Adlar WiFi Signal
    update_interval: 60s
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Compressor Target Frequency"
    register_type: holding
    address: 0x0027
    device_class: frequency
    value_type: S_WORD
    accuracy_decimals: 0
    unit_of_measurement: Hz
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Compressor Running Frequency"
    register_type: holding
    address: 0x0040
    device_class: frequency
    value_type: S_WORD
    accuracy_decimals: 0
    unit_of_measurement: Hz
    filters:
      - heartbeat:
          period: 10s #60s
  #        optimistic: true
      - clamp:
          min_value: 0
          max_value: 150
          ignore_out_of_range: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Fan Running Speed"
    register_type: holding
    address: 0x0041
    device_class: frequency
    value_type: S_WORD
    accuracy_decimals: 0
    unit_of_measurement: Hz
    filters:
      - heartbeat:
          period: 10s #60s
    #      optimistic: true
      - clamp:
          min_value: 0
          max_value: 999
          ignore_out_of_range: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "EEV Open Step"
    id: "eev_open_step"
    register_type: holding
    address: 0x0042
    value_type: S_WORD
    accuracy_decimals: 0
    unit_of_measurement: P
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "EVI Valve Open Step"
    register_type: holding
    address: 0x0043
    value_type: S_WORD
    accuracy_decimals: 0
    unit_of_measurement: P
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "AC Input Voltage"
    id: voltage
    register_type: holding
    address: 0x0044
    value_type: S_WORD
    accuracy_decimals: 0
    device_class: voltage
    unit_of_measurement: V
    filters:
      - multiply: 0.99
      - clamp:
          min_value: 207
          max_value: 253
          ignore_out_of_range: false  
      # - heartbeat:
      #     period: 60s
      #     optimistic: false
      - median:
          window_size: 5
          send_every: 1
          send_first_at: 1

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "AC Input Current"
    id: current
    register_type: holding
    address: 0x0045
    value_type: S_WORD
    accuracy_decimals: 1
    device_class: current
    unit_of_measurement: A
    filters:
      # - heartbeat:
      #     period: 60s
      #     optimistic: true
      - multiply: 0.1
      - clamp:
          min_value: 0
          max_value: 16
          ignore_out_of_range: false  
      - calibrate_linear:
          method: exact
          datapoints:
           - 0.0 -> 0.0 # Map 0.0 (from sensor) to 0.0 (true value)
           - 1.0 -> 1.0 #?
           - 2.0 -> 1.8 #?
           - 3.0 -> 2.5 #?
           - 4.0 -> 2.9
           - 5.0 -> 3.4
           - 6.0 -> 4.6 #?
           - 7.0 -> 5.5 #5.9?
           - 8.0 -> 6.8 #6.4?
           - 9.0 -> 7.8 
           - 10.0 -> 8.5
           - 11.0 -> 9.0

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Compressor Phase Current"
    register_type: holding
    address: 0x0046
    value_type: S_WORD
    accuracy_decimals: 1
    device_class: current
    unit_of_measurement: A
    filters:
      - multiply: 0.1
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Compressor IPM Temp."
    register_type: holding
    address: 0x0047
    value_type: S_WORD
    accuracy_decimals: 0
    device_class: temperature
    unit_of_measurement: °C
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "High Pressure Saturation Temp."
    register_type: holding
    address: 0x0048
    value_type: S_WORD
    accuracy_decimals: 0
    device_class: temperature
    unit_of_measurement: °C
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Low  Pressure Saturation Temp."
    register_type: holding
    address: 0x0049
    value_type: S_WORD
    accuracy_decimals: 0
    device_class: temperature
    unit_of_measurement: °C
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Ambient Temp. T1"
    register_type: holding
    address: 0x004A
    value_type: S_WORD
    accuracy_decimals: 0
    device_class: temperature
    unit_of_measurement: °C
    filters:
      - filter_out: NAN
      - heartbeat:
          period: 60s
          optimistic: true
      - median:
          window_size: 5
          send_every: 5
          send_first_at: 1
      - clamp:
          min_value: -40
          max_value: 140
          ignore_out_of_range: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Outer Coil Temp. T2"
    register_type: holding
    address: 0x004B
    value_type: S_WORD
    accuracy_decimals: 0
    device_class: temperature
    unit_of_measurement: °C
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Inner Coil Temp. T3"
    register_type: holding
    address: 0x004C
    value_type: S_WORD
    accuracy_decimals: 0
    device_class: temperature
    unit_of_measurement: °C
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Suction Temp. T4"
    register_type: holding
    address: 0x004D
    value_type: S_WORD
    accuracy_decimals: 0
    device_class: temperature
    unit_of_measurement: °C
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Exhaust Temp. T5"
    register_type: holding
    address: 0x004E
    value_type: S_WORD
    accuracy_decimals: 0
    device_class: temperature
    unit_of_measurement: °C
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Water Inlet Temp. T6"
    id: temp_inlet
    register_type: holding
    address: 0x004F
    device_class: temperature
    value_type: S_WORD
    accuracy_decimals: 1
    unit_of_measurement: °C
    filters:
      - clamp:
          min_value: -40
          max_value: 140
          ignore_out_of_range: false  

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Water Outlet Temp. T7"
    id: temp_outlet
    register_type: holding
    address: 0x0050
    device_class: temperature
    value_type: S_WORD
    accuracy_decimals: 1
    unit_of_measurement: °C
    filters:
      - clamp:
          min_value: -40
          max_value: 140
          ignore_out_of_range: false

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Economizer Inlet Temp. T8"
    register_type: holding
    address: 0x0051
    device_class: temperature
    value_type: S_WORD
    accuracy_decimals: 0
    unit_of_measurement: °C
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Economizer Outlet Temp. T9"
    register_type: holding
    address: 0x0052
    device_class: temperature
    value_type: S_WORD
    accuracy_decimals: 0
    unit_of_measurement: °C
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Plate Heat Exchanger Exhaust Temp."
    register_type: holding
    address: 0x0055
    device_class: temperature
    value_type: S_WORD
    accuracy_decimals: 0
    unit_of_measurement: °C
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Water Pump Speed PWM"
    register_type: holding
    address: 0x0057
    device_class: frequency
    value_type: S_WORD
    accuracy_decimals: 0
    unit_of_measurement: Hz
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "Water Flow"
    id: flow
    register_type: holding
    address: 0x0058
    device_class: volume_flow_rate
    value_type: S_WORD
    accuracy_decimals: 0
    filters:
      - filter_out: NAN
      - heartbeat:
          period: 60s
          optimistic: true
      - lambda: |-
          if (x < 0 || x > 18 || isnan(x)) {
            return {}; // This ignores the value; the sensor keeps the last state
          }
          return x; // This accepts and publishes the new value
    unit_of_measurement: L/min

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "P26 Hysterese watertemperatuur start warmtepomp"
    register_type: holding
    address: 0x011A
    device_class: temperature
    value_type: S_WORD
    accuracy_decimals: 0
    unit_of_measurement: °C
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: modbus_adlar
    name: "P111 Heating set temperature - lowest temperature"
    register_type: holding
    address: 0x016F
    device_class: temperature
    value_type: S_WORD
    accuracy_decimals: 0
    unit_of_measurement: °C
    disabled_by_default: true

  - platform: template
    name: "AC Input Power"
    id: power_in
    lambda: |-
      return int(id(voltage).state * id(current).state);
    accuracy_decimals: 0
    filters:
      - skip_initial: 1
      - median:
          window_size: 5
          send_every: 1
      - clamp:
          min_value: 0
          max_value: 2000
          ignore_out_of_range: false 
    unit_of_measurement: "W"
    device_class: power

  - platform: template
    name: "Thermal Output Power"
    id: power_out
    filters:
      - skip_initial: 1
      - median:
          window_size: 5
          send_every: 1
      - clamp:
          min_value: 0
          max_value: 10000
          ignore_out_of_range: true 
    lambda: |-
      const float smw = 0.998;  // soortelijke massa water
      const float sww = 4186;   // soortelijke warmte water
      return int((id(flow).state / 1000 / 60) * smw * sww * (id(temp_outlet).state - id(temp_inlet).state) * 1000);
    accuracy_decimals: 0
    unit_of_measurement: "W"
    device_class: power
    disabled_by_default: true

  - platform: template
    name: "COP"
    id: cop
    filters:
      - clamp:
          min_value: 0
          max_value: 10
          ignore_out_of_range: false
    lambda: |-
      if (id(power_out).state > 0 && id(power_in).state > 0) {
        return id(power_out).state / id(power_in).state;
      } else {
        return 0;
      }
    accuracy_decimals: 1
    unit_of_measurement: ""
    state_class: measurement

