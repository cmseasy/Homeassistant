#
# Kamertemperatuur toe- en afname
#
  - sensor:
      - unique_id: kamertemperatuur_gradient
        name: kamertemperatuur gradient
        unit_of_measurement: '°C/h'
        state: >
         {{ state_attr('binary_sensor.kamertemperatuur_stijgt', "gradient") | float(0) * 3600 | round(3)
          }}

  - sensor:
      - unique_id: kamertemperatuur_setpoint_afwijking
        name: kamertemperatuur setpoint afwijking
        unit_of_measurement: '°C'
        availability: >
          {{ states('sensor.smart_thermostat_x_temperatuur') | float(0) > 10 and
            states('sensor.smart_thermostat_x_set_temperatuur') | float(0) > 10
          }}
        state: >
          {{ (states('sensor.smart_thermostat_x_temperatuur') | float(0)
          - states('sensor.smart_thermostat_x_set_temperatuur') | float(0)) | round(2) 
          }}
#
# set de kamertemperatuur waardering: te warm, te koud, ok
#
  - sensor:
    - unique_id: kamertemperatuur_waardering
      name: Kamertemperatuur waardering
      availability: >
        {{  state_attr('climate.smart_thermostat_x', "temperature") | is_number and
            state_attr('climate.smart_thermostat_x', "temperature") | float > 0 
        }}
      state: >-
          {% set offset_lower = states('input_number.thermostaat_offset') | float %}
          {% set offset_upper = states('input_number.thermostaat_hysterese') | float %}
          {% set thermostat_setpoint = state_attr('climate.smart_thermostat_x', "temperature") | float(18) %}
          {% set min = (thermostat_setpoint + offset_lower) | float | round(1) %}
          {% set max = (thermostat_setpoint + offset_lower + offset_upper) | float | round(1) %}
          {% set kamer_temp = states('sensor.smart_thermostat_x_temperatuur') | float  %} 
            {% if kamer_temp > max %}
            {% set state = 'Te warm' %}
            {% elif kamer_temp < min %}
            {% set state = 'Te koud' %}
          {% else %}
            {% set state = 'Ok' %}
          {% endif %}
          {{ state }}
      attributes:
        lower_limit: >-
          {% set offset_lower = states('input_number.thermostaat_offset') | float %}
          {% set thermostat_setpoint = state_attr('climate.smart_thermostat_x', "temperature") | float(18) %}
          {% set state = thermostat_setpoint + offset_lower %}
          {{ state | float | round(1)}}
        upper_limit: >-
          {% set offset_lower = states('input_number.thermostaat_offset') | float %}
          {% set offset_upper = states('input_number.thermostaat_hysterese') | float %}
          {% set thermostat_setpoint = state_attr('climate.smart_thermostat_x', "temperature") | float(18) %}
          {% set state = thermostat_setpoint + offset_lower + offset_upper %}
          {{ state | float | round(1)}}







  - sensor:
    - unique_id: kamertemperatuur_verandering
      name: "Kamertemperatuur verandering"
      # device_class: temperature
      # state_class: measurement
      # unit_of_measurement: '°C'
      icon: mdi:thermometer
      # availability: >
      #   {{  state_attr('climate.smart_thermostat_x', "temperature") | is_number and
      #       state_attr('climate.smart_thermostat_x', "temperature") | float > 0 
      #   }}
      state: >-
        {% set temp_daalt = states('binary_sensor.kamertemperatuur_daalt') %}
          {% set temp_stijgt = states('binary_sensor.kamertemperatuur_stijgt') %}
          {% if temp_daalt == 'on' and temp_stijgt == 'off' %}
            Daalt
          {% elif temp_daalt == 'off' and temp_stijgt == 'on' %}
            Stijgt
          {% else %}
            Stabiel
          {% endif %}



  - sensor:
    - unique_id: wp_waterpomp_regeling
      name: "WP waterpomp regeling"
      availability: >
        {{  states('sensor.wp_delta_t') not in ['unavailable', 'unknown'] and
            states('sensor.adlar_water_flow') not in ['unavailable', 'unknown'] 
        }}
      state: >-
        {% set p99 = 5 %}
        {% set p163 = 10 %}
        {% set delta_t = states('sensor.wp_delta_t') | float %}
        {% set flow = states('sensor.adlar_water_flow') | float %}
        {% if delta_t > (p99 + 3) or flow < p163 %}
          Pompvermogen + 2%
        {% elif delta_t < (p99 - 1) or flow > p163 %}
          Pompvermogen - 2%
        {% else %}
          Pompvermogen stabiel
        {% endif %}

  # - trigger:
  #     - platform: time_pattern
  #       seconds: "/1" # Update elke seconde
  - sensor:
    - name: "Wachttijd Temp set Resterende Tijd"
      unique_id: wachttijd_temp_set
      icon: "mdi:timer-outline"
      state: >
        {% set timer = 'timer.wachttijd_temp_set_veranderen' %}
        {% set fin = state_attr(timer, 'finishes_at') %}
        {% if is_state(timer, 'active') and fin != None %}
          {% set t = (as_timestamp(fin) - as_timestamp(now())) | int %}
          {{ '%02d:%02d' | format((t // 60), (t % 60)) }}
        {% else %}
          00:00
        {% endif %}


#
# set de actuele watertemperatuur die geregeld moet worden afhankelijk van keuze in- outlet. 
#
  - sensor:
    - unique_id: water_temperature_controlled
      name: Water temperature controlled
      device_class: temperature
      # state_class: measurement
      unit_of_measurement: '°C'
      icon: mdi:thermometer
      availability: >
        {{  states('select.adlar_p116_regeling_in_of_outlet') not in ['unavailable', 'unknown']and
            states('sensor.adlar_water_inlet_temp_t6') not in ['unavailable', 'unknown'] and
            states('sensor.adlar_water_outlet_temp_t7') not in ['unavailable', 'unknown'] 
        }}
      state: >-
          {% set control_mode = states('select.adlar_p116_regeling_in_of_outlet') %}
          {% set inlet_temp = states('sensor.adlar_water_inlet_temp_t6') | float %}
          {% set outlet_temp = states('sensor.adlar_water_outlet_temp_t7') | float %}
          {% if "Inlet" in control_mode %}
            {% set temp = inlet_temp %}
          {% elif "Outlet" in control_mode  %}
            {% set temp = outlet_temp %}
          {% endif %}
          {{ temp }}


