
#
# Templates
#
template:

  #
# Warmtepomp delta T, verschil tussen in- en outlet temperatuur
#
  - sensor:
    - unique_id: wp_delta_t
      name: "WP delta T"
      device_class: temperature
      state_class: measurement
      unit_of_measurement: "°C"
      availability: >
        {{  states('sensor.adlar_water_outlet_temp_t7') not in ['unavailable', 'unknown'] and
            states('sensor.adlar_water_inlet_temp_t6') not in ['unavailable', 'unknown']
        }}
      state:
        "{{ states('sensor.adlar_water_outlet_temp_t7') | float(0) | round(1)
        -states('sensor.adlar_water_inlet_temp_t6') | float(0) | round(1)
        }}"


