#
# Selectors
#
input_select:
  wp_selecteer_energiemodus:
    name: WP Selecteer de energiemodus
    icon: mdi:leaf
    options:
      - "Normaal"
      - "Eco"
      - "Boost"
      - "Auto"
  wp_selecteer_bedrijfsmodus:
    name: WP Selecteer de bedrijfsmodus
    icon: mdi:heat-pump-outline
    options:
#      - "Uit" 
#      - "Aan"
      - "Adlar handbediend"
      - "Adlar LT8/JAN"
      - "Adlar warmtecurves"
      - "Auto verwarmen"
      - "Auto koelen"
      - "Auto Homey PID"
  wp_selecteer_nacht_eco:
    name: Energiemodus 's nacht op Eco
    icon: mdi:clock
    options:
      - "Aan"
      - "Uit"

#
# Nummerieke invoer
#
input_number:
  wp_berekende_optimale_temp_set:
    name: wp berekende optimale temp set
    min: 24.0
    max: 40.0
    step: 1.0
#    initial: 28
    icon: mdi:heat-pump-outline
    unit_of_measurement: "°C"
    mode: box
  thermostaat_offset:
    name: Thermostaat offset (min setpoint)
    min: -3.0
    max: 3.0
    step: 0.1
#    initial: 0
    icon: mdi:thermometer-chevron-down
    unit_of_measurement: "°C"
    mode: box
  thermostaat_hysterese:
    name: Thermostaat hysterese (max setpoint)
    min: 0.0
    max: 5.0
    step: 0.1
#    initial: 0.2
    icon: mdi:thermometer-chevron-up
    unit_of_measurement: "°C"
    mode: box
  temperatuurvertraging:
    name: Reactietijd op temperatuurverandering (min)
    min: 0
    max: 60
    step: 1
#    initial: 30
    icon: mdi:timer-lock-outline
    unit_of_measurement: "min"
    mode: box


#
# Timers
#
timer:
  wachttijd_temp_set_veranderen:
    name: Wachttijd temp set veranderen
    duration: 00:30:00
    icon: mdi:timer-lock-outline
    restore: true
  tijd_eco_na_defrost:
    name: Tijdsduur eco na defrost (min)
    duration: 00:20:00
    icon: mdi:timer-lock-outline
    restore: true


#
# Binary sensors
#
binary_sensor:
  - platform: trend
    sensors:
      kamertemperatuur_stijgt:
        friendly_name: 'Kamertemperatuur stijgt'
#        entity_id: var.wp_ruimtetemperatuur_gemeten
        entity_id: sensor.smart_thermostat_x_temperatuur
        sample_duration: 0
        max_samples: 10
        min_samples: 4 #6
        min_gradient: 0.00003  #####
        # = 0,1gr/1800s 0.0001 units/sec = 0.36 gr/h
      kamertemperatuur_daalt:
        friendly_name: 'Kamertemperatuur daalt'
#        entity_id: var.wp_ruimtetemperatuur_gemeten
        entity_id: sensor.smart_thermostat_x_temperatuur
        sample_duration: 0
        max_samples: 10
        min_samples: 4 #6
        min_gradient: -0.00003  #####

      inlettemperatuur_daalt:
        friendly_name: 'Inlettemperatuur daalt'
#        entity_id: var.wp_inlet_temperatuur
        entity_id: sensor.adlar_water_inlet_temp_t6
        sample_duration: 0
        max_samples: 10
        min_samples: 2 #6
        min_gradient: -0.00003  #####

      kamertemperatuur_stijgt_30_metingen:
        friendly_name: 'Kamertemperatuur stijgt in 30 metingen'
#        entity_id: var.wp_ruimtetemperatuur_gemeten
        entity_id: sensor.smart_thermostat_x_temperatuur
#        sample_duration: 2700 # 45min
        max_samples: 40
        min_samples: 30
        min_gradient: 0.00003  #####
        # = 0,1gr/1800s 0.0001 units/sec = 0.36 gr/h

      kamertemperatuur_stijgt_1uur:
        friendly_name: 'Kamertemperatuur stijgt in 1 uur'
#        entity_id: var.wp_ruimtetemperatuur_gemeten
        entity_id: sensor.smart_thermostat_x_temperatuur
        sample_duration: 2700 # 45min
        max_samples: 40
        min_samples: 30
        min_gradient: 0.00003  #####
        # = 0,1gr/1800s 0.0001 units/sec = 0.36 gr/h

