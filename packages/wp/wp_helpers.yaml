  - platform: threshold
    name: wp eco mode buitentemperatuur
    device_class: running
#    entity_id: var.wp_buitentemperatuur_gemeten
    entity_id: sensor.adlar_ambient_temp_t1
    hysteresis: 0
    upper: 6  #####
    lower: 5  #####

  - platform: tod
    name: wp eco mode nacht
    unique_id: eco_mode_nacht
    after: "23:00:00"  #####
    before: "08:00:00"  #####




