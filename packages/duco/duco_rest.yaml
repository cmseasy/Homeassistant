rest:

  # Ducobox
  - resource: http://192.168.1.73/boxinfoget
    scan_interval: 10
    timeout: 8
    verify_ssl: false 
    sensor:
    - name: "DucoBox boxinfoget"
      unique_id: ducobox_boxinfoget
      icon: mdi:fan
      value_template: " OK "
      json_attributes:
  #    - General
      - EnergyInfo
      - EnergyFan
  #    - EnergyCalib
      - NightBoostInfo
      - VentCoolInfo

  # Ducobox node 1
  - resource: http://192.168.1.73/nodeinfoget?node=1
    scan_interval: 10
    timeout: 8
    verify_ssl: false
    sensor:
    - name: "DucoBox node 1"
      unique_id: ducobox
      icon: mdi:fan
      value_template: "{{ value_json.state }}"
      json_attributes:
  #      - node
  #      - devtype
  #      - subtype
  #      - netw
  #      - addr
  #      - sub
  #      - prnt
  #      - asso
  #      - location
        - state
        - cntdwn
  #      - endtime
  #      - mode
  #      - trgt
  #      - actl
  #      - ovrl
  #      - snsr
  #      - cerr
  #      - swversion
  #      - serialnb
        - temp
  #      - co2
        - rh
  #      - error
  #      - show
  #      - link

