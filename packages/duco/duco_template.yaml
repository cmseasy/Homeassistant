  - sensor:
    - name: "Duco RHSetpoint gewenst"
      unique_id: duco_wtw_gewenst_rhsetpoint
      unit_of_measurement: '%'
      availability: >
        {{  states('sensor.smart_thermostat_x_luchtvochtigheid') | is_number | float > 0 }}
      state: >
        {{ (((((states('sensor.smart_thermostat_x_luchtvochtigheid') | float ) + 2.5 + 0 ) / 10 ) | round( 1 , "half", 0 ) * 10) , 55) | max | int }}
  # uitleg + 2,5 = afronding naar 'ceil'en de plus daarna is de offset 
