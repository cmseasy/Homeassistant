  ###   WTW warmte terugwin uit   ###

  #
  # WTW debiet
  #
  - sensor:
    - unique_id: ducobox_debiet
      name: "Ducobox debiet"
      unit_of_measurement: "m³/h"
      device_class: volume_flow_rate
      icon: mdi:air-filter
      availability: >
        {{  states('sensor.ducobox_supplyfanpwmpercentage') not in ['unavailable', 'unknown'] and
            states('sensor.ducobox_exhaustfanpwmpercentage') not in ['unavailable', 'unknown']
        }}
      state: >-
        {{ (states('sensor.ducobox_supplyfanpwmpercentage') | float(0)
        + states('sensor.ducobox_exhaustfanpwmpercentage') | float(0) )
        / 2 * 150 / 100 
        }}

  #
  ## Duco box WTW Rendement
  #
  - sensor:
      - name: "Duco box Rendement"
        unique_id: duco_box_rendement
        state_class: measurement
        unit_of_measurement: "%"
        availability: >
          {{  states('sensor.ducobox_temperatuur_toevoer_van_buiten') | is_number | float > 0 and
              states('sensor.ducobox_temperatuur_toevoer_naar_woning') | is_number | float > 0 and
              states('sensor.ducobox_temperatuur_afvoer_van_woning') | is_number | float > 0 and
              states('sensor.ducobox_temperatuur_afvoer_naar_buiten') | is_number | float > 0
          }}
        state: >
          {% set tnw = states("sensor.ducobox_temperatuur_toevoer_naar_woning") | float(0) | round(1) %}
          {% set tvb = states("sensor.ducobox_temperatuur_toevoer_van_buiten") | float(0) | round(1) %} 
          {% set avw = states("sensor.ducobox_temperatuur_afvoer_van_woning") | float(0) | round(1) %}  
          {% set anb = states("sensor.ducobox_temperatuur_afvoer_naar_buiten") | float(0) | round(1) %}
          {% set rendement = 0 %}
          {% if avw != tvb %}
            {% set rendement = (((tnw-tvb)/(avw-tvb))*100)  | float(-1.0) | round(1) %}          
          {% endif %}
          {% if rendement < 0 %}
            {% set rendement = 0 | float(0) | round(1) %} 
          {% endif %}
          {% if rendement > 100 %}
            {% set rendement = 100 | float(0) | round(1) %} 
          {% endif %}
          {{ rendement }}


        #  '{{ ((states("sensor.ducobox_temperatuur_toevoer_naar_woning")|float
        #   - states("sensor.ducobox_temperatuur_toevoer_van_buiten")|float)
        #   / (states("sensor.ducobox_temperatuur_afvoer_van_woning")|float
        #   - states("sensor.ducobox_temperatuur_toevoer_van_buiten")|float) *100 )| round(1)
        #   }}'  

  #
  ## Duco WTW abs humidity
  #
  - sensor:
    - unique_id: absolute_humidity_woonkamer
      name: "Abolute humidity woonkamer"
      state_class: measurement
      unit_of_measurement: 'g/m³'
      # availability: >
      #   {{  states('sensor.ducobox_relatieve_vochtigheid') not in ['unavailable', 'unknown']and
      #         states('sensor.ducobox_temperatuur') not in ['unavailable', 'unknown']
      #   }}
      # availability: >
      #   {{  states('sensor.ducobox_relatieve_vochtigheid') | is_number and
      #       states('sensor.ducobox_relatieve_vochtigheid') | float > 0 and
      #       states('sensor.ducobox_temperatuur') | is_number and
      #       states('sensor.ducobox_temperatuur') | float > 0 
      #   }}
      # availability: >
      #   {{  states('sensor.ducobox_relatieve_vochtigheid') | is_number | float > 0 and
      #       states('sensor.ducobox_temperatuur') | is_number | float > 0 
      #   }}
      # state: >
      #   {% set h, t = states('sensor.ducobox_relatieve_vochtigheid') | float,
      #     states('sensor.ducobox_temperatuur') %}
      #   {% if not h or t == 'unknown' -%}
      #     'unknown'
      #   {%- else %}
      #       {% set t = t | float %}
      #       {{ (h*6.112*2.1674*e**((t*17.67)/(t+243.5))/(t+273.15))|round(2) }}
      #     {% endif %}
      availability: >
        {{  states('sensor.smart_thermostat_x_luchtvochtigheid') | is_number | float > 0 and
            states('sensor.smart_thermostat_x_temperatuur') | is_number | float > 0 
        }}
      state: >
        {% set h, t = states('sensor.smart_thermostat_x_luchtvochtigheid') | float,
          states('sensor.smart_thermostat_x_temperatuur') %}
        {% if not h or t == 'unknown' -%}
          'unknown'
        {%- else %}
            {% set t = t | float %}
            {{ (h*6.112*2.1674*e**((t*17.67)/(t+243.5))/(t+273.15))|round(2) }}
          {% endif %}

  - sensor:
    - unique_id: absolute_humidity_buiten
      name: "Abolute humidity buiten"
      state_class: measurement
      unit_of_measurement: 'g/m³'
      state: >
        {% set h, t = states('sensor.buienradar_humidity') | float,
          states('sensor.buienradar_temperature') %}
        {% if not h or t == 'unknown' -%}
          'unknown'
        {%- else %}
            {% set t = t | float %}
            {{ (h*6.112*2.1674*e**((t*17.67)/(t+243.5))/(t+273.15))|round(2) }}
          {% endif %}

