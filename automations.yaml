- id: '1741689683630'
  alias: 'WP AV: temp set door woonkamer temperatuur'
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - sensor.adlar_esp_online_sensor
    to:
    - gestart
    for:
      hours: 0
      minutes: 0
      seconds: 10
  - trigger: state
    entity_id:
    - timer.wachttijd_temp_set_veranderen
    to:
    - idle
    for:
      hours: 0
      minutes: 0
      seconds: 1
  - trigger: state
    entity_id:
    - sensor.smart_thermostat_x_temperatuur
    from:
    to:
    for:
      hours: 0
      minutes: 0
      seconds: 1
    enabled: true
  - trigger: time_pattern
    minutes: /30
    enabled: false
  - trigger: state
    entity_id:
    - sensor.water_temperature_controlled
    for:
      hours: 0
      minutes: 0
      seconds: 10
    enabled: false
  - trigger: state
    entity_id:
    - sensor.smart_thermostat_x_delta_t
    for:
      hours: 0
      minutes: 0
      seconds: 10
    enabled: false
  conditions:
  - condition: state
    entity_id: sensor.adlar_esp_online_sensor
    state:
    - gestart
  - condition: state
    entity_id: switch.adlar_main_switch
    state:
    - 'on'
  - condition: state
    entity_id: input_select.wp_selecteer_bedrijfsmodus
    state: Auto verwarmen
    enabled: true
  - condition: state
    entity_id: select.adlar_mode
    state:
    - Heating
  - condition: state
    entity_id: binary_sensor.adlar_defrost_running
    state:
    - 'off'
    for:
      hours: 0
      minutes: 10
      seconds: 0
  - condition: state
    entity_id: binary_sensor.adlar_system_oil_return
    state:
    - 'off'
    for:
      hours: 0
      minutes: 5
      seconds: 0
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: timer.wachttijd_temp_set_veranderen
        state: idle
      - condition: state
        entity_id: sensor.kamertemperatuur_waardering
        state:
        - Te koud
        for:
          hours: 0
          minutes: 2
          seconds: 0
      - condition: or
        conditions:
        - condition: state
          entity_id: sensor.kamertemperatuur_verandering
          state:
          - Daalt
          for:
            hours: 0
            minutes: 2
            seconds: 0
          enabled: true
        - condition: state
          entity_id: sensor.kamertemperatuur_verandering
          state:
          - Stabiel
          for:
            hours: 0
            minutes: 15
            seconds: 0
          enabled: true
      sequence:
      - action: number.set_value
        metadata: {}
        data:
          value: "{% set max_set_temp = 60 %}\n{% set temp_set = states('number.adlar_temp_set_heating')
            | int %}\n{% set delta_t = states('sensor.smart_thermostat_x_delta_t')
            | float %}\n{% set gradient = states('sensor.kamertemperatuur_gradient')
            | float %}\n{% if delta_t < -0.5 and gradient < 0.5 %}\n  {{ [temp_set
            + 2, max_set_temp] | min }}\n{% else %}\n  {{ [temp_set + 1, max_set_temp]
            | min }}\n{% endif %}\n"
        enabled: true
        target:
          entity_id: number.adlar_temp_set_heating
      - action: timer.start
        metadata: {}
        data:
          duration: 00:{{ states('input_number.temperatuurvertraging') | int }}
        target:
          entity_id: timer.wachttijd_temp_set_veranderen
      - action: logbook.log
        metadata: {}
        data:
          entity_id: number.adlar_temp_set_heating
          name: Adlar automation
          message: 'WP Auto Verwarmen: optie 1'
      alias: Temp set verhogen bij te koud en niet stijgende kamertemperatuur
    - conditions:
      - condition: state
        entity_id: timer.wachttijd_temp_set_veranderen
        state: idle
      - condition: state
        entity_id: binary_sensor.adlar_compressor_active
        state:
        - 'on'
      - condition: or
        conditions:
        - condition: state
          entity_id: sensor.kamertemperatuur_waardering
          state:
          - Te warm
          enabled: true
          for:
            hours: 0
            minutes: 2
            seconds: 0
        - condition: and
          conditions:
          - condition: state
            entity_id: sensor.kamertemperatuur_waardering
            state:
            - Ok
            enabled: true
            for:
              hours: 0
              minutes: 10
              seconds: 0
          - condition: state
            entity_id: sensor.water_temperature_controlled
            state:
            - 'off'
            enabled: true
          - condition: not
            conditions:
            - condition: numeric_state
              entity_id: number.adlar_temp_set_heating
              below: sensor.water_temperature_controlled
        - condition: and
          conditions:
          - condition: numeric_state
            entity_id: sensor.smart_thermostat_x_delta_t
            below: 0
            above: -0.1
            enabled: true
          - condition: numeric_state
            entity_id: sensor.kamertemperatuur_gradient
            above: 0.8
          enabled: true
      sequence:
      - action: number.set_value
        metadata: {}
        data:
          value: '{% set min_set_temp = 18 %}

            {% set temp_set = states(''number.adlar_temp_set_heating'') | int %}

            {{ [temp_set - 1, min_set_temp] | max }}

            '
        enabled: true
        target:
          entity_id: number.adlar_temp_set_heating
      - action: timer.start
        metadata: {}
        data:
          duration: '{# 00:{{ states(''input_number.temperatuurvertraging'') | int
            }} #}

            00:05'
        target:
          entity_id: timer.wachttijd_temp_set_veranderen
        enabled: true
      - action: logbook.log
        metadata: {}
        data:
          entity_id: number.adlar_temp_set_heating
          name: Adlar automation
          message: 'WP Auto Verwarmen: optie 2'
      alias: Temp set verlagen bij te warm, stijgende kamertemperatuur en compressor
        actief
    - conditions:
      - condition: state
        entity_id: timer.wachttijd_temp_set_veranderen
        state: idle
        enabled: true
      - condition: state
        entity_id: binary_sensor.adlar_compressor_active
        state:
        - 'off'
      - condition: state
        entity_id: sensor.kamertemperatuur_waardering
        state:
        - Te warm
        - Ok
        for:
          hours: 0
          minutes: 0
          seconds: 30
      - condition: not
        conditions:
        - condition: state
          entity_id: sensor.kamertemperatuur_waardering
          state:
          - Te koud
        enabled: false
      - condition: numeric_state
        entity_id: sensor.smart_thermostat_x_delta_t
        above: 0
        enabled: false
      - condition: or
        conditions:
        - condition: numeric_state
          entity_id: number.adlar_temp_set_heating
          below: sensor.water_temperature_controlled
        - condition: state
          entity_id: sensor.kamertemperatuur_waardering
          state:
          - Te warm
          enabled: true
          for:
            hours: 0
            minutes: 2
            seconds: 0
        - condition: and
          conditions:
          - condition: state
            entity_id: sensor.kamertemperatuur_waardering
            state:
            - Ok
            enabled: true
            for:
              hours: 0
              minutes: 10
              seconds: 0
          - condition: state
            entity_id: binary_sensor.inlettemperatuur_daalt
            state:
            - 'off'
            enabled: true
        - condition: and
          conditions:
          - condition: numeric_state
            entity_id: sensor.smart_thermostat_x_delta_t
            below: 0.2
            above: -0.4
            enabled: true
          - condition: numeric_state
            entity_id: sensor.kamertemperatuur_gradient
            above: 0.7
        enabled: false
      sequence:
      - action: number.set_value
        metadata: {}
        data:
          value: '{% set min_set_temp = 18 %}

            {% set controlled_temp = states(''sensor.water_temperature_controlled'')
            | int %}

            {{ [controlled_temp - 1, min_set_temp] | max }}

            '
        enabled: true
        target:
          entity_id: number.adlar_temp_set_heating
      - action: timer.start
        metadata: {}
        data:
          duration: '{# 00:{{ states(''input_number.temperatuurvertraging'') | int
            }} #}

            00:10'
        target:
          entity_id: timer.wachttijd_temp_set_veranderen
        enabled: false
      - action: logbook.log
        metadata: {}
        data:
          entity_id: number.adlar_temp_set_heating
          name: Adlar automation
          message: 'WP Auto Verwarmen: optie 3'
      alias: Temp set verlagen bij te warme kamertemperatuur en compressor inactief
    - conditions:
      - condition: state
        entity_id: timer.wachttijd_temp_set_veranderen
        state: idle
