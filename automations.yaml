  alias: WP Eco bij defrost
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.adlar_defrost_running
    to:
    - 'off'
    id: Defrost voorbij
    for:
      hours: 0
      minutes: 0
      seconds: 1
    from:
    - 'on'
  - trigger: state
    entity_id:
    - timer.tijd_eco_na_defrost
    to:
    - idle
    for:
      hours: 0
      minutes: 0
      seconds: 1
    from:
    - active
  conditions: []
  actions:
  - if:
    - condition: trigger
      id:
      - Defrost voorbij
    - condition: numeric_state
      entity_id: sensor.adlar_ambient_temp_t1
      above: 5
    - condition: not
      conditions:
      - condition: state
        entity_id: select.adlar_running_mode
        state:
        - Silent
    then:
    - action: select.select_option
      metadata: {}
      target:
        entity_id: select.adlar_running_mode
      data:
        option: Silent
    - action: timer.start
      metadata: {}
      data: {}
      target:
        entity_id:
        - timer.tijd_eco_na_defrost
      enabled: true
    else:
    - if:
      - condition: state
        entity_id: binary_sensor.eco_mode_in_de_nacht
        state:
        - 'off'
      - condition: state
        entity_id: select.adlar_running_mode
        state:
        - Silent
      then:
      - action: select.select_option
        metadata: {}
        target:
          entity_id: select.adlar_running_mode
        data:
          option: Standard
  mode: single
- id: '1764318076054'
  alias: 'Wp AV: debouncing bij start waterpomp'
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.wp_pomp_water_flow
    to:
    - 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 2
  conditions:
  - condition: state
    entity_id: binary_sensor.192_168_1_130
    state:
    - 'on'
  - condition: state
    entity_id: switch.adlar_main_switch
    state:
    - 'on'
  - condition: state
    entity_id: input_select.wp_selecteer_bedrijfsmodus
    state: Auto verwarmen
    enabled: true
  - condition: state
    entity_id: select.adlar_mode
    state:
    - Heating
  - condition: state
    entity_id: binary_sensor.adlar_defrost_running
    state:
    - 'off'
    for:
      hours: 0
      minutes: 10
      seconds: 0
    enabled: false
  - condition: state
    entity_id: binary_sensor.adlar_system_oil_return
    state:
    - 'off'
    for:
      hours: 0
      minutes: 5
      seconds: 0
    enabled: false
  actions:
  - action: number.set_value
    metadata: {}
    data:
      value: '{% set max_set_temp = 60  | int %}

        {% set current_temp_set = states(''number.adlar_temp_set_heating'') | float
        %}

        {{ [current_temp_set + 1, max_set_temp] | min }}

        '
    enabled: true
    target:
      entity_id: number.adlar_temp_set_heating
  - wait_for_trigger:
    - trigger: state
      entity_id:
      - binary_sensor.adlar_compressor_active
      to:
      - 'on'
      for:
        hours: 0
        minutes: 0
        seconds: 30
    timeout:
      hours: 0
      minutes: 3
      seconds: 0
      milliseconds: 0
  - action: number.set_value
    metadata: {}
    data:
      value: '{% set current_temp_set = states(''number.adlar_temp_set_heating'')
        | float %}

        {{ current_temp_set - 1 }}

        '
    enabled: true
    target:
      entity_id: number.adlar_temp_set_heating
  - action: logbook.log
    metadata: {}
    data:
      name: Adlar automation
      entity_id: number.adlar_temp_set_heating
      message: WP debounce waterpomp
  mode: single
