- id: '1695645493368'
  alias: Lampen achtertuin
  description: ''
  triggers:
  - event: sunset
    offset: +00:25:00
    id: Aan
    trigger: sun
  - entity_id:
    - switch.switch_2
    to: 'on'
    id: Aan
    from:
    trigger: state
  - event: sunrise
    offset: -00:00:10
    id: Uit
    trigger: sun
  - entity_id:
    - switch.switch_2
    to: 'off'
    id: Uit
    from:
    trigger: state
  - minutes: '15'
    id: Uit
    hours: '23'
    seconds: '0'
    trigger: time_pattern
  - hours: '00'
    minutes: '15'
    seconds: '00'
    id: Uit
    enabled: true
    trigger: time_pattern
  - hours: '01'
    minutes: '15'
    seconds: '00'
    id: Uit
    enabled: true
    trigger: time_pattern
  conditions:
  - condition: sun
    before: sunrise
    after: sunset
  actions:
  - if:
    - condition: trigger
      id:
      - Aan
    - condition: sun
      before: sunrise
      after: sunset
    - condition: state
      entity_id: group.somebody_home
      state: home
      enabled: true
    then:
    - data: {}
      target:
        entity_id: switch.switch_2
      action: switch.turn_on
    else:
    - if:
      - condition: trigger
        id:
        - Uit
      then:
      - target:
          entity_id: switch.switch_2
        data: {}
        action: switch.turn_off
      enabled: true
  mode: single
  max_exceeded: silent
