- id: '1699034051130'
  alias: Lamp voordeur
  description: ''
  triggers:
  - entity_id:
    - binary_sensor.doorbell
    to: 'on'
    from: 'off'
    id: Aan deurbel
    trigger: state
    for:
      hours: 0
      minutes: 0
      seconds: 0
  - entity_id: person.marjan
    zone: zone.thuis_omgeving
    event: enter
    id: Aan thuiskomst
    trigger: zone
  - entity_id: person.martin
    zone: zone.thuis_omgeving
    event: enter
    id: Aan thuiskomst
    trigger: zone
  conditions:
  - condition: sun
    before: sunrise
    after: sunset
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: trigger
        id:
        - Aan deurbel
      - condition: state
        entity_id: group.somebody_home
        state: home
    - condition: and
      conditions:
      - condition: trigger
        id:
        - Aan thuiskomst
  actions:
  - delay:
      hours: 0
      minutes: 0
      seconds: 2
      milliseconds: 0
  - target:
      entity_id:
      - switch.switch_4
    data: {}
    action: switch.turn_on
  - delay:
      hours: 0
      minutes: 5
      seconds: 0
      milliseconds: 0
  - target:
      entity_id: switch.switch_4
    data: {}
    action: switch.turn_off
  mode: restart
- id: '1699658408465'
  alias: 'Lamp voortuin '
  description: ''
  triggers:
  - entity_id:
    - switch.switch_3_2
    to: 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 1
    id: Aan bewegingsmelder
    trigger: state
  - entity_id:
    - switch.switch_3_2
    to: 'off'
    for:
      hours: 0
      minutes: 0
      seconds: 0
    id: Uit bewegingsmelder
    trigger: state
  - trigger: sun
    event: sunset
    offset: 00:25:00
    id: zonondergang
  - trigger: time
    at: '23:00:00'
    id: tijdstip lamp uit
  conditions:
  - condition: sun
    before: sunrise
    after: sunset
    enabled: true
  actions:
  - if:
    - condition: trigger
      id:
      - zonondergang
    then:
    - data: {}
      target:
        entity_id:
        - switch.switch_3
      action: switch.turn_on
    else:
    - if:
      - condition: trigger
        id:
        - Uit tijdslot
        enabled: false
      - condition: trigger
        id:
        - tijdstip lamp uit
      then:
      - data: {}
        target:
          entity_id:
          - switch.switch_3
        action: switch.turn_off
  - if:
    - condition: state
      entity_id: switch.switch_3
      state:
      - 'off'
    - condition: trigger
      id:
      - Aan bewegingsmelder
    then:
    - data: {}
      target:
        entity_id: switch.switch_3
      action: switch.turn_on
    - delay:
        hours: 0
        minutes: 5
        seconds: 0
        milliseconds: 0
    - data: {}
      target:
        entity_id: switch.switch_3
      action: switch.turn_off
  mode: single
  max_exceeded: silent
