- id: '1728250313751'
  alias: WTW Duco RH Setpoint regeling
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - sensor.duco_rhsetpoint_gewenst
    from:
    to:
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: sensor.duco_rhsetpoint
      state: unavailable
    - condition: state
      entity_id: sensor.duco_rhsetpoint
      state: unknown
  - condition: numeric_state
    entity_id: sensor.duco_rhsetpoint
    above: 0
  actions:
  - if:
    - condition: numeric_state
      entity_id: sensor.duco_rhsetpoint_gewenst
      above: 90
    then:
    - if:
      - condition: not
        conditions:
        - condition: state
          entity_id: sensor.duco_rhsetpoint
          state: '90'
          for:
            hours: 0
            minutes: 15
            seconds: 0
      then:
      - action: rest_command.duco_box_rhsetpoint_90
        data: {}
    else:
    - if:
      - condition: numeric_state
        entity_id: sensor.duco_rhsetpoint_gewenst
        above: 80
      then:
      - if:
        - condition: not
          conditions:
          - condition: state
            entity_id: sensor.duco_rhsetpoint
            state: '80'
            for:
              hours: 0
              minutes: 15
              seconds: 0
        then:
        - action: rest_command.duco_box_rhsetpoint_80
          data: {}
      else:
      - if:
        - condition: numeric_state
          entity_id: sensor.duco_rhsetpoint_gewenst
          above: 65
        then:
        - if:
          - condition: not
            conditions:
            - condition: state
              entity_id: sensor.duco_rhsetpoint
              state: '70'
              for:
                hours: 0
                minutes: 15
                seconds: 0
          then:
          - action: rest_command.duco_box_rhsetpoint_70
            data: {}
        else:
        - if:
          - condition: numeric_state
            entity_id: sensor.duco_rhsetpoint_gewenst
            above: 60
          then:
          - if:
            - condition: not
              conditions:
              - condition: state
                entity_id: sensor.duco_rhsetpoint
                state: '65'
                for:
                  hours: 0
                  minutes: 15
                  seconds: 0
            then:
            - action: rest_command.duco_box_rhsetpoint_65
              data: {}
          else:
          - if:
            - condition: numeric_state
              entity_id: sensor.duco_rhsetpoint_gewenst
              above: 55
            then:
            - if:
              - condition: not
                conditions:
                - condition: state
                  entity_id: sensor.duco_rhsetpoint
                  state: '60'
                  for:
                    hours: 0
                    minutes: 15
                    seconds: 0
              then:
              - action: rest_command.duco_box_rhsetpoint_60
                data: {}
            else:
            - if:
              - condition: not
                conditions:
                - condition: state
                  entity_id: sensor.duco_rhsetpoint
                  state: '55'
                  for:
                    hours: 0
                    minutes: 15
                    seconds: 0
              then:
              - action: rest_command.duco_box_rhsetpoint_55
                data: {}
  mode: single
