      - action: select.select_option
        metadata: {}
        target:
          entity_id: select.adlar_running_mode
        data:
          option: Standard
    - conditions:
      - condition: state
        entity_id: input_select.wp_selecteer_energiemodus
        state: Eco
        for:
          hours: 0
          minutes: 0
          seconds: 10
      - condition: trigger
        id:
        - Energiemodus verandering
      sequence:
      - action: select.select_option
        metadata: {}
        target:
          entity_id: select.adlar_running_mode
        data:
          option: Silent
    - conditions:
      - condition: state
        entity_id: input_select.wp_selecteer_energiemodus
        state: Boost
        for:
          hours: 0
          minutes: 0
          seconds: 10
      - condition: trigger
        id:
        - Energiemodus verandering
      sequence:
      - action: select.select_option
        metadata: {}
        target:
          entity_id: select.adlar_running_mode
        data:
          option: Boost
    - conditions:
      - condition: state
        entity_id: input_select.wp_selecteer_energiemodus
        state: Auto
        for:
          hours: 0
          minutes: 0
          seconds: 10
      sequence:
      - choose:
        - conditions:
          - condition: trigger
            id:
            - Boven 6
            - Start nacht
          sequence:
          - action: select.select_option
            metadata: {}
            target:
              entity_id: select.adlar_running_mode
            data:
              option: Silent
          alias: Eco energiemodus
        - conditions:
