- id: '1739362408029'
  alias: WP energiemodus selecteren
  description: Normaal, Eco of Boost.
  triggers:
  - trigger: state
    entity_id:
    - input_select.wp_selecteer_energiemodus
    from:
    to:
    for:
      hours: 0
      minutes: 0
      seconds: 10
    id: Energiemodus verandering
  - trigger: time_pattern
    hours: /1
    id: Tijdpatroon
  - trigger: numeric_state
    entity_id:
    - sensor.adlar_ambient_temp_t1
    for:
      hours: 0
      minutes: 15
      seconds: 0
    below: 5
    id: Onder 5
  - trigger: numeric_state
    entity_id:
    - sensor.adlar_ambient_temp_t1
    for:
      hours: 0
      minutes: 15
      seconds: 0
    above: 6
    id: Boven 6
  - trigger: time
    at: '23:00:00'
    id: Start nacht
    enabled: false
  - trigger: time
    at: 09:00:00
    id: Start dag
    enabled: false
  - trigger: state
    entity_id:
    - binary_sensor.eco_mode_in_de_nacht
    from:
    - 'off'
    to:
    - 'on'
    id: Start nacht
  - trigger: state
    entity_id:
    - binary_sensor.eco_mode_in_de_nacht
    from:
    - 'on'
    to:
    - 'off'
    id: Start dag
  conditions:
  - condition: state
    entity_id: switch.adlar_main_switch
    state:
    - 'on'
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_select.wp_selecteer_energiemodus
