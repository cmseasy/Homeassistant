- id: '1773961754232'
  alias: 'WP AV: stel in temp_set na compressor aanpassing'
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.adlar_compressor_active
    to:
    - 'off'
    from:
    - 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 0
    id: Compressor stopt
    enabled: true
  - trigger: state
    entity_id:
    - binary_sensor.adlar_compressor_active
    to:
    - 'on'
    from:
    - 'off'
    for:
      hours: 0
      minutes: 0
      seconds: 0
    id: Compressor start
    enabled: true
  conditions:
  - condition: state
    entity_id: input_select.wp_selecteer_bedrijfsmodus
    state: Auto verwarmen
    enabled: true
  - condition: state
    entity_id: switch.adlar_main_switch
    state:
    - 'on'
  - condition: state
    entity_id: binary_sensor.adlar_defrost_running
    state:
    - 'off'
    for:
      hours: 0
      minutes: 0
      seconds: 0
  - condition: state
    entity_id: binary_sensor.adlar_system_oil_return
    state:
    - 'off'
  - condition: numeric_state
    entity_id: climate.smart_thermostat_x
    attribute: temperature
    above: 20
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - Compressor stopt
      - condition: state
        entity_id: sensor.kamertemperatuur_waardering
        state: Te koud
      sequence:
      - action: number.set_value
        metadata: {}
        data:
          value: '{% set temp_set = states(''input_number.wp_berekende_optimale_temp_set'')
            | int %}

            {{ temp_set }}

            '
        enabled: true
        target:
          entity_id: number.adlar_temp_set_heating
      - action: logbook.log
        metadata: {}
        data:
          entity_id: number.adlar_temp_set_heating
          name: Adlar automation
          message: 'WP Auto Verwarmen: stel in de optimale en de temp set temperatuur:
            optie 1, temp set + 1'
      - action: timer.start
        metadata: {}
        data:
          duration: 00:{{ states('input_number.temperatuurvertraging') | int }}
        target:
          entity_id: timer.wachttijd_temp_set_veranderen
      alias: Compressor stopt en kamertemperatuur te koud
    - conditions:
      - condition: trigger
        id:
        - Compressor stopt
      - condition: state
        entity_id: sensor.kamertemperatuur_waardering
        state: Te warm
        for:
          hours: 0
          minutes: 10
          seconds: 0
      - condition: state
        entity_id: sensor.kamertemperatuur_verandering
        for:
          hours: 0
          minutes: 10
          seconds: 0
        state: Stijgt
      - condition: state
        entity_id: timer.wachttijd_temp_set_veranderen
        state:
        - idle
      sequence:
      - action: number.set_value
        metadata: {}
        data:
          value: '{% set temp_set = states(''input_number.wp_berekende_optimale_temp_set'')
            | int %}

            {{ temp_set }}

            '
        enabled: true
        target:
          entity_id: number.adlar_temp_set_heating
      - action: logbook.log
        metadata: {}
        data:
          entity_id: number.adlar_temp_set_heating
          name: Adlar automation
          message: 'WP Auto Verwarmen: stel in de optimale en de temp set temperatuur:
            optie 1, temp set of inlet - 1'
      - action: timer.start
        metadata: {}
        data:
          duration: 00:{{ states('input_number.temperatuurvertraging') | int }}
        target:
          entity_id: timer.wachttijd_temp_set_veranderen
      alias: Compressor stopt en kamertemperatuur te warm en stijgt
    - conditions:
      - condition: trigger
        id:
        - Compressor start
      - condition: not
        conditions:
        - condition: state
          entity_id: sensor.kamertemperatuur_waardering
          state: Te koud
      - condition: state
        entity_id: timer.wachttijd_temp_set_veranderen
        state:
        - idle
      sequence:
      - action: number.set_value
        metadata: {}
        data:
          value: '{% set temp_set = states(''input_number.wp_berekende_optimale_temp_set'')
            | int %}

            {{ temp_set }}

            '
        enabled: true
        target:
          entity_id: number.adlar_temp_set_heating
      - action: logbook.log
        metadata: {}
        data:
          entity_id: number.adlar_temp_set_heating
          name: Adlar automation
          message: 'WP Auto Verwarmen: stel in de optimale en de temp set temperatuur:
            optie 2, temp set of inlet - 1'
      - action: timer.start
        metadata: {}
        data:
          duration: 00:{{ states('input_number.temperatuurvertraging') | int }}
        target:
          entity_id: timer.wachttijd_temp_set_veranderen
      alias: Compressor start en kamertemperatuur is niet te koud
  mode: single
