- id: '1741943333563'
  alias: 'WP AV: temp set door thermosstaat aanpassing'
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - sensor.smart_thermostat_x_set_temperatuur
    for:
      hours: 0
      minutes: 0
      seconds: 30
    from:
    to:
  conditions:
  - condition: state
    entity_id: binary_sensor.192_168_1_130
    state:
    - 'on'
  - condition: state
    entity_id: input_select.wp_selecteer_bedrijfsmodus
    state: Auto verwarmen
    enabled: true
  - condition: template
    value_template: "{# Alleen als de verandering een nummerieke verandering is #}\n{%
      set temp_from = trigger.from_state.state | float(0)  %} \n{% set temp_to = trigger.to_state.state
      | float(0) %} \n{% if temp_from > 0 and temp_to > 0  %}\n  {% set state = 'true'
      %}\n{% else %}\n  {% set state = 'false' %}\n{% endif %}\n{{ state }}"
    alias: Verandering is numeriek
  actions:
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.smart_thermostat_x_set_temperatuur
        below: sensor.smart_thermostat_x_temperatuur
      - alias: ' Verlaging moet lager zijn dan 0,6 grC '
        condition: template
        value_template: "{# Verandering is minimaal de temp_delta waarde #}\n{% set
          temp_from = trigger.from_state.state | float(0)  %} \n{% set temp_to = trigger.to_state.state
          | float(0) %} \n{% set temp_delta = (temp_from - temp_to) | float  %} \n{%
          if temp_delta > 0.6 %}\n  {% set state = 'true' %}\n{% else %}\n  {% set
          state = 'false' %}\n{% endif %}\n{{ state }}"
        enabled: true
      sequence:
      - action: number.set_value
        metadata: {}
        data:
          value: '{% set temp_set = states(''number.adlar_temp_set_heating'') | int
            %}

            {{ [temp_set - 5, 20 ] | max }}

            '
        enabled: true
        target:
          entity_id: number.adlar_temp_set_heating
      - action: timer.start
        metadata: {}
        target:
          entity_id: timer.wachttijd_temp_set_veranderen
        data: {}
      - action: logbook.log
        metadata: {}
        data:
          entity_id: number.adlar_temp_set_heating
          name: Adlar automation
          message: 'WP thermostaat: optie 1'
      alias: Temp set bij thermostaat verlaging
    - conditions:
      - condition: numeric_state
        entity_id: sensor.smart_thermostat_x_set_temperatuur
        above: sensor.smart_thermostat_x_temperatuur
      - condition: state
        entity_id: binary_sensor.adlar_compressor_active
        state:
        - 'off'
      - condition: template
        value_template: "{# Verandering is minimaal de temp_delta waarde #}\n{% set
          temp_from = trigger.from_state.state | float(0)  %} \n{% set temp_to = trigger.to_state.state
          | float(0) %} \n{% set temp_delta = (temp_to - temp_from) | float  %} \n{%
          if temp_delta > 0.4 %}\n  {% set state = 'true' %}\n{% else %}\n  {% set
          state = 'false' %}\n{% endif %}\n{{ state }}"
        enabled: true
        alias: Verhoging moet hoger zijn dan 0,4 grC
      sequence:
      - action: number.set_value
        metadata: {}
        data:
          value: '{% set temp_set = states(''number.adlar_temp_set_heating'') | int
            %}

            {% set opt_set_temp = states(''input_number.wp_berekende_optimale_temp_set'')
            | int %}

            {{ [temp_set + 2 , opt_set_temp] | max }}

            '
        enabled: true
        target:
          entity_id: number.adlar_temp_set_heating
      - action: timer.start
        metadata: {}
        data:
          duration: 00:{{ states('input_number.temperatuurvertraging') | int + 10
            }}
        target:
          entity_id: timer.wachttijd_temp_set_veranderen
      - action: logbook.log
        metadata: {}
        data:
          entity_id: number.adlar_temp_set_heating
          name: Adlar automation
          message: 'WP thermostaat: optie 2'
      - wait_for_trigger:
        - trigger: state
          entity_id:
          - binary_sensor.adlar_compressor_active
          to:
          - 'on'
          for:
            hours: 0
            minutes: 0
            seconds: 30
        continue_on_timeout: false
      - action: number.set_value
        metadata: {}
        data:
          value: '{% set temp_set = states(''number.adlar_temp_set_heating'') | int
            %}

            {% set opt_set_temp = states(''input_number.wp_berekende_optimale_temp_set'')
            | int %}

            {{ [temp_set - 1 , opt_set_temp] | max }}

            '
        enabled: true
        target:
          entity_id: number.adlar_temp_set_heating
      alias: Temp set bij thermostaat verhoging en compressor is niet actief
    - conditions:
      - condition: numeric_state
        entity_id: sensor.smart_thermostat_x_set_temperatuur
        above: sensor.smart_thermostat_x_temperatuur
      - condition: state
        entity_id: binary_sensor.adlar_compressor_active
        state:
        - 'on'
      - condition: template
        value_template: "{# Verandering is minimaal de temp_delta waarde #}\n{% set
          temp_from = trigger.from_state.state | float(0)  %} \n{% set temp_to = trigger.to_state.state
          | float(0) %} \n{% set temp_delta = (temp_to - temp_from) | float  %} \n{%
          if temp_delta > 0.4 %}\n  {% set state = 'true' %}\n{% else %}\n  {% set
          state = 'false' %}\n{% endif %}\n{{ state }}"
        enabled: true
        alias: Verhoging moet hoger zijn dan 0,4 grC
      sequence:
      - action: number.set_value
        metadata: {}
        data:
          value: '{% set temp_set = states(''number.adlar_temp_set_heating'') | int
            %}

            {% set opt_set_temp = states(''input_number.wp_berekende_optimale_temp_set'')
            | int %}

            {{ [temp_set + 1 , opt_set_temp] | max }}

            '
        enabled: true
