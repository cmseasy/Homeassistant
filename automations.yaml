            entity_id: sensor.smart_thermostat_x_delta_t
            below: 0
            above: -0.1
            enabled: true
          - condition: numeric_state
            entity_id: sensor.kamertemperatuur_gradient
            above: 0.8
          enabled: true
      sequence:
      - action: number.set_value
        metadata: {}
        data:
          value: '{% set min_set_temp = 18 %}

            {% set temp_set = states(''number.adlar_temp_set_heating'') | int %}

            {{ [temp_set - 1, min_set_temp] | max }}

            '
        enabled: true
        target:
          entity_id: number.adlar_temp_set_heating
      - action: timer.start
        metadata: {}
        data:
          duration: 00:{{ states('input_number.temperatuurvertraging') | int }}
        target:
          entity_id: timer.wachttijd_temp_set_veranderen
      - action: logbook.log
        metadata: {}
        data:
          entity_id: number.adlar_temp_set_heating
          name: Adlar automation
