- id: '1666173486028'
  alias: Notify Doorbell
  description: ''
  triggers:
  - entity_id:
    - binary_sensor.doorbell
    from: 'off'
    to: 'on'
    trigger: state
    for:
      hours: 0
      minutes: 0
      seconds: 1
  conditions: []
  actions:
  - if:
    - condition: zone
      entity_id: person.martin
      zone: zone.thuis_omgeving
    then:
    - data:
        message: Iemand heeft aangebeld
        data:
          channel: doorbell
          ttl: 0
          priority: high
          importance: high
          timeout: 600
          notification_icon: mdi:bell-ring
          vibrationPattern: 100, 1000, 100, 1000, 100
      action: notify.mobile_app_gsm_martin
  - if:
    - condition: zone
      entity_id: person.marjan
      zone: zone.thuis_omgeving
    then:
    - data:
        message: Iemand heeft aangebeld
        data:
          channel: doorbell
          ttl: 0
          priority: high
          importance: high
          timeout: 600
          notification_icon: mdi:bell-ring
          vibrationPattern: 100, 1000, 100, 1000, 100
      action: notify.mobile_app_gsm_marjan
  mode: single
- id: '1686683478640'
